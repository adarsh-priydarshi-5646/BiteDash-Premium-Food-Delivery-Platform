name: Check Backend Environment Variables

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: bitedash-cluster
  ECS_SERVICE: bitedash-backend-service
  ECS_TASK_DEFINITION: bitedash-backend-task

jobs:
  check:
    name: Check Current Environment Variables
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get current task definition
        run: |
          echo "📥 Fetching current task definition..."
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_DEFINITION }} \
            --query 'taskDefinition.containerDefinitions[0].environment' \
            --output json > env-vars.json
          
          echo ""
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║           CURRENT BACKEND ENVIRONMENT VARIABLES              ║"
          echo "╠══════════════════════════════════════════════════════════════╣"
          cat env-vars.json | jq -r '.[] | "║ \(.name): \(.value)"'
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          
          # Check for ngrok URL
          if cat env-vars.json | jq -r '.[].value' | grep -q "ngrok"; then
            echo "⚠️  WARNING: ngrok URL found in environment variables!"
            echo "❌ This is causing the Google OAuth redirect_uri_mismatch error"
            echo ""
            echo "🔧 FIX: Run the 'Fix Backend Environment Variables' workflow"
          else
            echo "✅ No ngrok URLs found"
          fi
          
          # Check BACKEND_URL specifically
          BACKEND_URL=$(cat env-vars.json | jq -r '.[] | select(.name=="BACKEND_URL") | .value')
          if [ -n "$BACKEND_URL" ]; then
            echo ""
            echo "Current BACKEND_URL: $BACKEND_URL"
            if [[ "$BACKEND_URL" == *"ngrok"* ]]; then
              echo "❌ BACKEND_URL contains ngrok - NEEDS FIX"
            else
              echo "✅ BACKEND_URL looks correct"
            fi
          else
            echo "⚠️  BACKEND_URL not set in environment variables"
          fi
