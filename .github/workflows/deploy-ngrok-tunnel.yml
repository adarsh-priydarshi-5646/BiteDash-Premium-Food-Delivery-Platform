name: Deploy ngrok Tunnel

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: bitedash-cluster

jobs:
  deploy-ngrok:
    name: Setup ngrok Tunnel for HTTPS
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create CloudWatch Log Group
        run: |
          aws logs create-log-group \
            --log-group-name /ecs/bitedash-ngrok \
            --region ${{ env.AWS_REGION }} || echo "Log group exists"

      - name: Get current backend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition bitedash-backend-task \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition' > task-def.json

      - name: Add ngrok sidecar container
        run: |
          cat task-def.json | jq --arg token "${{ secrets.NGROK_AUTHTOKEN }}" '
            del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy) |
            .containerDefinitions += [{
              "name": "ngrok",
              "image": "ngrok/ngrok:latest",
              "essential": false,
              "command": [
                "http",
                "bitedash-alb-443240071.us-east-1.elb.amazonaws.com:80",
                "--authtoken",
                $token,
                "--log=stdout"
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/bitedash-ngrok",
                  "awslogs-region": "us-east-1",
                  "awslogs-stream-prefix": "ngrok"
                }
              },
              "portMappings": [],
              "environment": [],
              "mountPoints": [],
              "volumesFrom": []
            }]
          ' > task-def-updated.json

      - name: Register new task definition
        run: |
          aws ecs register-task-definition \
            --cli-input-json file://task-def-updated.json \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service bitedash-backend-service \
            --task-definition bitedash-backend-task \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service to stabilize
        run: |
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services bitedash-backend-service \
            --region ${{ env.AWS_REGION }}

      - name: Get ngrok URL from logs
        run: |
          echo "⏳ Waiting 30 seconds for ngrok to start..."
          sleep 30
          
          echo "📋 Checking ngrok logs..."
          aws logs tail /ecs/bitedash-ngrok --follow --since 1m --region ${{ env.AWS_REGION }} || true

      - name: Instructions
        run: |
          echo "✅ ngrok tunnel deployed successfully!"
          echo ""
          echo "📝 To get your HTTPS URL:"
          echo "1. Go to: https://dashboard.ngrok.com/cloud-edge/endpoints"
          echo "2. You'll see your tunnel URL like: https://abc123.ngrok-free.app"
          echo "3. Copy that URL"
          echo ""
          echo "OR check CloudWatch logs:"
          echo "aws logs tail /ecs/bitedash-ngrok --follow --region us-east-1"
          echo ""
          echo "Next steps:"
          echo "1. Get your ngrok URL from dashboard"
          echo "2. Run 'Update URLs for HTTPS' workflow with that URL"
          echo "3. Update Google OAuth URLs"
          echo "4. Done! 🎉"
