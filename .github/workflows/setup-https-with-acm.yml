name: Setup HTTPS with AWS Certificate Manager

on:
  workflow_dispatch:
    inputs:
      domain_name:
        description: 'Your domain name (e.g., bitedash.duckdns.org)'
        required: true
        type: string
      certificate_arn:
        description: 'ACM Certificate ARN (after DNS validation)'
        required: true
        type: string

env:
  AWS_REGION: us-east-1
  ALB_ARN: arn:aws:elasticloadbalancing:us-east-1:347907787151:loadbalancer/app/bitedash-alb/720d6a4a8170a7b8
  FRONTEND_TG_ARN: arn:aws:elasticloadbalancing:us-east-1:347907787151:targetgroup/bitedash-frontend-tg/4090471480602dd5

jobs:
  setup-https:
    name: Configure HTTPS on ALB
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create HTTPS Listener
        run: |
          aws elbv2 create-listener \
            --load-balancer-arn ${{ env.ALB_ARN }} \
            --protocol HTTPS \
            --port 443 \
            --certificates CertificateArn=${{ inputs.certificate_arn }} \
            --default-actions Type=forward,TargetGroupArn=${{ env.FRONTEND_TG_ARN }}

      - name: Get HTTP Listener ARN
        id: get-listener
        run: |
          LISTENER_ARN=$(aws elbv2 describe-listeners \
            --load-balancer-arn ${{ env.ALB_ARN }} \
            --query 'Listeners[?Port==`80`].ListenerArn' \
            --output text)
          echo "listener_arn=$LISTENER_ARN" >> $GITHUB_OUTPUT

      - name: Redirect HTTP to HTTPS
        run: |
          aws elbv2 modify-listener \
            --listener-arn ${{ steps.get-listener.outputs.listener_arn }} \
            --default-actions Type=redirect,RedirectConfig="{Protocol=HTTPS,Port=443,StatusCode=HTTP_301}"

      - name: Success message
        run: |
          echo "✅ HTTPS configured successfully!"
          echo ""
          echo "Your application is now accessible at:"
          echo "https://${{ inputs.domain_name }}"
          echo ""
          echo "Next steps:"
          echo "1. Update environment variables with new HTTPS URL"
          echo "2. Update Google OAuth URLs"
          echo "3. Test the application"
